name: Release

# Publishes the plugin as an installable package (main.js + manifest.json +
# styles.css) attached to a GitHub Release. Triggered by pushing a version
# tag that matches manifest.json (Obsidian convention, e.g. `0.1.0`).

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify manifest version matches tag
        run: |
          MANIFEST=$(node -p "require('./manifest.json').version")
          if [ "$GITHUB_REF_NAME" != "$MANIFEST" ]; then
            echo "Tag ($GITHUB_REF_NAME) does not match manifest.json version ($MANIFEST)" >&2
            exit 1
          fi

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" \
              main.js manifest.json styles.css versions.json --clobber
          else
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --notes "OpenLore Obsidian plugin $GITHUB_REF_NAME" \
              main.js manifest.json styles.css versions.json
          fi
